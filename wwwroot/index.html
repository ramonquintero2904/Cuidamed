<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cuidanet</title>
    <base href="/" />

    <link rel="stylesheet" href="lib/bootstrap/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="Cuidamed.styles.css" rel="stylesheet" />
    <link href="manifest.webmanifest" rel="manifest" />
    <link rel="apple-touch-icon" sizes="512x512" href="icon-512.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="icon-192.png" />

</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>

    <script src="_content/Microsoft.AspNetCore.Components.WebAssembly.Authentication/AuthenticationService.js"></script>

    <script src="_framework/blazor.webassembly.js" autostart="false"></script>
    <script>
        Blazor.start({
            loadBootResource: function (type, name, defaultUri, integrity) {
                // Desactiva la búsqueda de archivos comprimidos .br si GitHub Pages no los sirve
                if (type !== 'dotnetjs' && defaultUri.endsWith('.br')) {
                    return defaultUri.replace('.br', '');
                }
            }
        });
    </script>

    <script>navigator.serviceWorker.register('service-worker.js', { updateViaCache: 'none' });</script>

    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

    <script>
        window.BlazorCamera = {
            start: async (videoId) => {
                try {
                    const video = document.getElementById(videoId);
                    const stream = await navigator.mediaDevices.getUserMedia({
                        video: { facingMode: "environment" }, // Prioriza la cámara trasera en móviles
                        audio: false
                    });
                    video.srcObject = stream;
                    video.play();
                    return true;
                } catch (err) {
                    console.error("Error accediendo a la cámara: ", err);
                    return false;
                }
            },
            capture: (videoId, canvasId) => {
                const video = document.getElementById(videoId);
                const canvas = document.getElementById(canvasId);
                const context = canvas.getContext('2d');

                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                context.drawImage(video, 0, 0, canvas.width, canvas.height);

                // Retorna la imagen en formato Base64 comprimida como JPEG
                return canvas.toDataURL('image/jpeg', 0.85);
            }
        };

        window.BlazorOcr = {
            analizarDocumento: async function (imageSrc, lang = 'spa') {
                try {
                    // Creamos el worker de Tesseract configurado en español
                    const worker = await Tesseract.createWorker(lang);

                    // Realizamos el reconocimiento de la imagen (acepta URL base64 o blob URL)
                    const { data: { text } } = await worker.recognize(imageSrc);

                    // Destruimos el worker para liberar memoria en el navegador
                    await worker.terminate();

                    // Normalizamos el texto para facilitar la validación de palabras clave
                    const textoNormalizado = text.toLowerCase();

                    // Criterios de validación (puedes expandir esta lista)
                    const esValido = textoNormalizado.includes("recipe") ||
                        textoNormalizado.includes("récipe") ||
                        textoNormalizado.includes("diagnostico") ||
                        textoNormalizado.includes("diagnóstico") ||
                        textoNormalizado.includes("rp:") ||
                        textoNormalizado.includes("indicaciones");

                    return {
                        exito: true,
                        textoExtraido: text,
                        esDocumentoValido: esValido
                    };
                } catch (error) {
                    console.error("Error en Tesseract.js:", error);
                    return {
                        exito: false,
                        textoExtraido: "",
                        esDocumentoValido: false
                    };
                }
            }
        };

    </script>
</body>

</html>
